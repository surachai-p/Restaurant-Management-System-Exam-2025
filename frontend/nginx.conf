server {
    listen 80;

    # ==========================================
    # Frontend: React SPA Configuration
    # ==========================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # รองรับ Client-side Routing ของ React Router
        # (ถ้าหาไฟล์หรือโฟลเดอร์ไม่เจอ ให้ส่งกลับไปที่ index.html)
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # Backend: Reverse Proxy Configuration
    # ==========================================
    # (สมมติว่า backend รันอยู่บน container ชื่อ 'backend' port 3001)
    location /api/ {
        proxy_pass http://backend:3001;
        
        # ส่งต่อข้อมูลที่จำเป็นของฝั่ง Client ไปให้ Backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
