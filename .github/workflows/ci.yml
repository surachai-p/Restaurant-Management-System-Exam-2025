name: CI
on:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    # --- เพิ่ม 3 บรรทัดนี้เข้าไป ---
    defaults:
      run:
        working-directory: ./backend
    # ---------------------------
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Start Backend
        run: npm start & 

      - name: Wait for Server
        run: npx wait-on http://localhost:3001 --timeout 60000

      - name: Run Newman API Tests
        # ตรงนี้ต้องแก้ path ไฟล์ json ให้ย้อนกลับไปหาโฟลเดอร์ tests ที่อยู่ข้างนอกด้วย
        run: |
          newman run ../tests/postman/RMS-68030298-TestSuite-v2.json \
          -e ../tests/postman/env-ci.json \
          --reporters cli