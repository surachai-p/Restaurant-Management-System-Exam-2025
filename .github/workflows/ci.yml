name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 🛠️ BACKEND SETUP & SECURITY ---
    - name: Setup Node.js (Backend)
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      working-directory: backend
      run: npm ci

    - name: Security Audit (Backend)
      working-directory: backend
      run: npm audit --audit-level=high || true

    - name: Generate Prisma client
      working-directory: backend
      run: npx prisma generate

    # --- 🧪 TESTING & NEWMAN ---
    - name: Setup Database and Seed
      working-directory: backend
      run: npx prisma db push --force-reset && npx prisma db seed
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Run Backend Unit Tests
      working-directory: backend
      run: npm test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Start Server and Run Newman (E2E)
      working-directory: backend
      run: |
        # ติดตั้ง wait-on
        npm install wait-on
        
        # รัน Server ใน Background และรอให้ Port 3001 พร้อม
        npm run dev > server.log 2>&1 &
        npx wait-on tcp:3001 --timeout 60000
        
        # รัน Newman โดยชี้ Path ไปที่ไฟล์ JSON (ตรวจสอบตัวพิมพ์เล็ก-ใหญ่ให้ตรงกับ Folder จริงนะคั้บ)
        npx newman run /tests/postman/RMS-TestSuite-v2.json --reporters cli
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        JWT_SECRET: "rms-dev-secret-key-change-in-production"
        PORT: 3001

    # --- 🎨 FRONTEND SETUP & BUILD ---
    - name: Setup Node.js (Frontend)
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Run frontend build
      working-directory: frontend
      run: npm run build 