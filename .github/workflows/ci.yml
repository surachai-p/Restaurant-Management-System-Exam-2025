name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: cd backend && npm install

    - name: Generate Prisma client
      run: cd backend && npx prisma generate

    - name: Push Prisma Schema & Seed
      run: cd backend && npx prisma db push && npx tsx prisma/seed.ts
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Run backend tests
      run: cd backend && npm test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Setup Node.js for frontend
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install frontend dependencies
      run: cd frontend && npm install

    - name: Run frontend build
      run: cd frontend && npm run build

    - name: Backend Security Audit
      run: cd backend && npm audit --audit-level=high

    - name: Frontend Security Audit
      run: cd frontend && npm audit --audit-level=high

    - name: Install Newman & wait-on
      run: npm install -g newman wait-on

    - name: Run Newman Tests
      run: |
        cd backend
        npm run dev &
        npx wait-on http://localhost:3001/api/health
        cd ..
        newman run tests/postman/RMS-68030135-TestSuite.json \
          --environment tests/postman/env-ci.json \
          --reporters cli
        
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        JWT_SECRET: test-secret
        CORS_ORIGIN: http://localhost:5173