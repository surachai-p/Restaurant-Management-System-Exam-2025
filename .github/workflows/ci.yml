name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Backend Security Audit
        run: cd backend && npm audit --audit-level=high || true

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Run Unit Tests
        run: cd backend && npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

      - name: Run Newman E2E Tests
        run: |
          cd backend
          npx prisma db push
          npm run build
          npm start &
          # Wait for backend to be ready
          for i in {1..20}; do curl -s http://localhost:3001/api/health && break || sleep 2; done
          npm install -g newman
          newman run ../tests/postman/RMS-TestSuite-v2.json \
            -e ../tests/postman/env-local.json \
            --env-var "baseUrl=http://localhost:3001/api"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
          JWT_SECRET: test-secret-key-123
          NODE_ENV: production

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Frontend Security Audit
        run: cd frontend && npm audit --audit-level=high || true

      - name: Run frontend build
        run: cd frontend && npm run build
