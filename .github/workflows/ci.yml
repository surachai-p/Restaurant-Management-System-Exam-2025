name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: cd backend && npm ci

    - name: Generate Prisma client
      run: cd backend && npx prisma generate

    - name: Run backend tests
      run: cd backend && npm test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Setup Node.js for frontend
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Run frontend build
      run: cd frontend && npm run build

    - name: Start Backend Server in Background for Newman
      run: |
        cd backend
        npm run dev &
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        PORT: 3001
        NODE_ENV: test

    - name: Wait for Backend API to be fully ready
      run: |
        echo "Checking if backend is coming up..."
        for i in {1..30}; do
          if curl -s http://localhost:3001/api/auth/login > /dev/null || curl -s http://localhost:3001/ > /dev/null; then
            echo "Backend is up and running!"
            exit 0
          fi
          echo "Waiting for Backend to listen on port 3001... ($i/30)"
          sleep 3
        done
        echo "Backend failed to start"
        exit 1

    - name: Run Newman Postman Test Suite
      run: |
        npx newman run 'tests/postman/RMS-[68030300]-TestSuite.postman_collection.json' \
          --env-var "base_url=http://localhost:3001"