name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: cd backend && npm ci

    - name: Generate Prisma client
      run: cd backend && npx prisma generate

    - name: Run backend tests
      run: cd backend && npm test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Run backend security scan
      run: cd backend && npm audit --audit-level=high || true

    - name: Start backend for Newman
      run: |
        cd backend
        npm run build || true
        npx prisma db push || true
        npx tsx prisma/seed.ts || true
        npm run dev &
        sleep 5
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        JWT_SECRET: ci-secret

    - name: Run Newman E2E tests
      run: |
        npm install -g newman
        newman run tests/postman/RMS-TestSuite-v2.json --environment tests/postman/env.json --env-var base_url=http://localhost:3001
      continue-on-error: true

    - name: Setup Node.js for frontend
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Run frontend security scan
      run: cd frontend && npm audit --audit-level=high || true

    - name: Run frontend build
      run: cd frontend && npm run build