name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Global Tools (Newman & Wait-On)
      run: npm install -g newman newman-reporter-htmlextra wait-on

    - name: Install backend dependencies
      run: cd backend && npm ci

    - name: Generate Prisma client
      run: cd backend && npx prisma generate

    - name: Run backend tests
      run: cd backend && npm test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Run frontend build
      run: cd frontend && npm run build

    - name: Start Backend Server for Postman Testing
      run: |
        cd backend
        npm start &
        wait-on http://localhost:3001/api/health --timeout 30000
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        PORT: 3001

    - name: Run Newman Automation Tests & Log Pass Rate
      run: |
        newman run "tests/postman/RMS-68030020-TestSuite.postman_collection.json" \
          --env-var "base_url=http://localhost:3001" \
          --env-var "url=http://localhost:3001" \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export tests/reports/newman-report.html