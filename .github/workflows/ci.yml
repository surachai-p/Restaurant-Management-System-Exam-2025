name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: cd backend && npm ci

    - name: Generate Prisma client
      run: cd backend && npx prisma generate

    - name: Run backend unit tests
      run: cd backend && npm test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Security audit - Backend
      run: cd backend && npm audit --audit-level=high

    - name: Setup Node.js for frontend
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Security audit - Frontend
      run: cd frontend && npm audit --audit-level=high

    - name: Run frontend build
      run: cd frontend && npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: cd backend && npm ci

    - name: Generate Prisma client and seed database
      run: |
        cd backend
        npx prisma db push
        npx tsx prisma/seed.ts
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_e2e

    - name: Start backend server
      run: cd backend && npm run dev &
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_e2e
        JWT_SECRET: ci-test-secret-key-for-github-actions
        CORS_ORIGIN: '*'
        NODE_ENV: test
        PORT: 3001

    - name: Wait for backend to be ready
      run: |
        for i in {1..15}; do
          curl -sf http://localhost:3001/api/health && break || sleep 2
        done

    - name: Install Newman
      run: npm install -g newman newman-reporter-htmlextra

    - name: Run Newman E2E tests
      run: |
        newman run tests/postman/RMS-TestSuite-v2.json \
          --environment tests/postman/env-ci.json \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export tests/reports/newman-report.html \
          --suppress-exit-code

    - name: Upload Newman Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: newman-report
        path: tests/reports/newman-report.html
