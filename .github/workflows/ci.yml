name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rms_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js v22
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # --- Backend Section ---
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Run Security Audit (Backend)
      run: |
        cd backend
        npm audit --audit-level=high

    - name: Run Backend Unit Tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test_db?sslmode=disable
        JWT_SECRET: TestSecretKey2025
      run: |
        cd backend
        npx prisma db push
        npm test

    # --- Frontend Section ---
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Run Security Audit (Frontend)
      run: |
        cd frontend
        npm audit --audit-level=high

    # --- End-to-End Test Section (Newman) ---
    - name: Install Newman
      run: npm install -g newman

    - name: Start Backend Server for E2E
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test_db?sslmode=disable
        JWT_SECRET: TestSecretKey2025
        PORT: 3001
      run: |
        cd backend
        npm run dev &
        sleep 5

    - name: Run Newman Tests
      run: |
        newman run tests/postman/RMS-TestSuite-v2.json \
          --environment tests/postman/env-ci.json \
          --reporters cli || true