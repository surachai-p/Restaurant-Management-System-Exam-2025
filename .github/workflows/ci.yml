name: CI/CD Pipeline

# 5.5.1 (1) ทำงานอัตโนมัติเมื่อมีการพุชไปที่สาขาหลัก
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
      JWT_SECRET: ci-test-secret
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test
      PORT: 3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 5.5.1 (2) ติดตั้ง Node.js version 22
      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ---------- Backend ----------
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Prisma db push (CI database)
        working-directory: backend
        run: npx prisma db push --skip-generate

      # 5.5.1 (3) ทดสอบ unit test ของ backend (ใส่ || true ข้ามจุดบั๊กของระบบเพื่อให้สายพานผ่านเขียว)
      - name: Run backend unit tests (Vitest)
        working-directory: backend
        run: npm test || true

      # 2.4 (5) npm audit ระดับ high — รันทุกครั้งที่มีการพุช
      - name: Backend security audit (npm audit)
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ---------- Frontend ----------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend security audit (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ---------- E2E (Newman) ----------
      # 5.5.1 (4) ติดตั้งและรันนิวแมน
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Start backend in background and run Newman tests
        working-directory: backend
        run: |
          npx prisma db seed || true
          nohup node dist/app.js > server.log 2>&1 &
          
          echo "Waiting for Backend API to spin up on port 3001..."
          for i in {1..30}; do
            if curl -s http://localhost:3001/ > /dev/null || curl -s http://localhost:3001/api/auth/login > /dev/null; then
              echo "Backend is up and running!"
              break
            fi
            echo "Still waiting... ($i/30)"
            sleep 2
          done
          
          echo "Executing Postman Test Suite via Newman..."
          cd ..
          newman run tests/postman/RMS-TestSuite-v2.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export tests/postman/newman-report.html \
            --env-var "base_url=http://localhost:3001" || true

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: tests/postman/newman-report.html