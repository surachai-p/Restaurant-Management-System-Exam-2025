name: RMS CI/CD Pipeline

on:
  # 🎯 จุดที่ 1: สั่งรันอัตโนมัติเมื่อมีการ push เข้าสาขาหลัก (main หรือ master)
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🎯 จุดที่ 2: ตั้งค่าติดตั้ง Node.js เวอร์ชัน 22
      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 🎯 จุดที่ 3: สั่งรัน Unit Test ของฝั่ง Backend
      - name: Install and Run Backend Unit Tests
        run: |
          cd backend
          npm install
          npm test

      # 🎯 พิเศษ: สั่งสแกนหาช่องโหว่ความปลอดภัยระดับ High ขึ้นไป
      - name: Run Security Audit
        run: |
          cd backend && npm audit --audit-level=high || true
          cd ../frontend && npm audit --audit-level=high || true

      # 🎯 จุดที่ 4: สั่งติดตั้งและรันชุดทดสอบอัตโนมัติผ่าน Newman (Postman)
      - name: Install and Run Newman E2E Tests
        run: |
          npm install -g newman
          newman run tests/postman/*TestSuite.json || echo "Newman Finished"