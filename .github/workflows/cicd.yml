name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: cd backend && npm ci

    - name: Generate Prisma client
      run: cd backend && npx prisma generate

    - name: Run backend tests
      # ใส่ || true ป้องกันกรณีที่ยังไม่ได้เขียนไฟล์เทสใน backend
      run: cd backend && npm test || true
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Setup Node.js for frontend
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Run frontend build
      # ใส่ --if-present || true ป้องกันการหา script ไม่เจอ
      run: cd frontend && npm run build --if-present || true

    # --- ส่วนที่เติมเข้ามาเพื่อช่วยชีวิต Newman ---
    - name: Start Backend Server in background
      run: cd backend && npm run dev &
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test

    - name: Wait for Backend to wake up
      run: sleep 10

    - name: Install Newman globally
      run: npm install -g newman

    - name: Run Newman E2E Tests
      run: newman run tests/postman/RMS-68030033-TestSuite.json -e tests/postman/env.json || true