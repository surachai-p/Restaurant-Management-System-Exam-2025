name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # --- Backend Section ---
      - name: Setup Node.js for Backend
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend && npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        run: |
          cd backend
          npx prisma generate
          npx prisma db push

      - name: Run backend tests (Vitest)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
        run: |
          cd backend
          npm test

      - name: Start Backend Server for Newman
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rms_test
          PORT: 3001
          JWT_SECRET: test_secret_key_123
        run: |
          cd backend
          npm run build
          npm start &

      - name: Install Newman and Wait
        run: |
          npm install -g newman wait-on
          npx wait-on http://localhost:3001/api/health --timeout 60000

      - name: Run Newman API Tests
        run: |
          newman run tests/postman/RMS-68030298-TestSuite-v2.json \
          --reporters cli

      # --- Frontend Section ---
      - name: Setup Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend && npm ci

      - name: Run frontend build
        run: |
          cd frontend && npm run build