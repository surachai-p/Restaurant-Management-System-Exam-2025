services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rms

    ports:
      - "15432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped


  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rms
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x

    command: sh -c "npx prisma db push --skip-generate && npx tsx prisma/seed.ts || true"

    restart: "no"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner

    depends_on:
      postgres:
        condition: service_healthy

      migrate:
        condition: service_completed_successfully

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rms
      JWT_SECRET: supersecretjwtkey
      CORS_ORIGIN: http://localhost
      PORT: 3001
      NODE_ENV: production
      PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x

    ports:
      - "3001:3001"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    command: node dist/app.js

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api

    depends_on:
      backend:
        condition: service_healthy

    environment:
      VITE_API_URL: /api

    ports:
      - "80:80"

    restart: unless-stopped


volumes:
  postgres-data: