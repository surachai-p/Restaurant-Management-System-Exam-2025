  #     timeout: 5s
  #     retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3001
      DATABASE_URL: "postgresql://neondb_owner:npg_z0dSDRf6JLHX@ep-shy-sound-aq1dtjyo.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require"
      JWT_SECRET: "rms-dev-secret-change-in-prod"
      CORS_ORIGIN: "http://localhost"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:3001/api"
    container_name: rms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  rms-network:
    driver: bridge
