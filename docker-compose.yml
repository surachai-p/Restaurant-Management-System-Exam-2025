services:
  db:
    image: postgres:16-alpine
    container_name: rms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rms_db
      JWT_SECRET: rms-staging-secret-key-123456
      CORS_ORIGIN: http://localhost
    ports:
      - "3002:3001"  # <-- สลับมาใช้พอร์ต 3002 บนเครื่องเรา เพื่อไม่ให้ชนกับระบบอื่นครับ
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3002  # <-- ปรับตัวชี้เป้าของหน้าบ้านให้วิ่งมาที่พอร์ต 3002 ด้วยครับ
    container_name: rms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: {}